server {
    listen 80;
    server_name cessnock-ses.local 192.168.1.100;

    root /var/www/ses;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location /equipment-check {
        alias /var/www/ses/equipment-check;
        try_files $uri $uri/ $uri.html =404;
    }

    location /stores {
        alias /var/www/ses/stores;
        try_files $uri $uri/ $uri.html =404;
    }

    location /operational-readiness {
        alias /var/www/ses/operational-readiness;
        try_files $uri $uri/ $uri.html =404;
    }

    location /training {
        alias /var/www/ses/training;
        try_files $uri $uri/ $uri.html =404;
    }

    location /membership {
        alias /var/www/ses/membership;
        try_files $uri $uri/ $uri.html =404;
    }
}
